name: Monthly V5.16 ETF Allocation

on:
  workflow_dispatch:
  schedule:
    # Run after US market close during the first week of each month.
    # The guard step below commits/uploads only after the strategy has a
    # current-month rebalance date, so weekend/holiday first days are handled.
    - cron: "30 23 1-7 * *"

permissions:
  contents: write
  actions: read

concurrency:
  group: monthly-v516-allocation
  cancel-in-progress: false

jobs:
  run-v516-allocation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas numpy yfinance riskfolio-lib openpyxl matplotlib
          fi

      - name: Run V5.16 production strategy with attribution
        run: |
          python v5_16_Final.py   --end-date auto

      - name: Check whether current-month rebalance exists
        id: check_rebalance
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from zoneinfo import ZoneInfo
          from datetime import datetime
          import os
          import pandas as pd

          github_output = Path(os.environ["GITHUB_OUTPUT"])

          def set_output(name: str, value: str) -> None:
              with github_output.open("a", encoding="utf-8") as fh:
                  fh.write(f"{name}={value}\n")

          weights_file = Path("outputs_option2_v5_16_score_tilted_cvar/walk_forward_windows/2023/weights_by_rebalance.csv")

          now_ny = datetime.now(ZoneInfo("America/New_York")).date()
          set_output("run_month", now_ny.strftime("%Y-%m"))

          if not weights_file.exists():
              print(f"::warning::Missing {weights_file}")
              set_output("current_month_rebalance", "false")
              set_output("latest_rebalance_date", "missing")
              raise SystemExit(0)

          weights = pd.read_csv(weights_file, index_col=0)
          if weights.empty:
              print(f"::warning::{weights_file} is empty")
              set_output("current_month_rebalance", "false")
              set_output("latest_rebalance_date", "empty")
              raise SystemExit(0)

          latest_rebalance = pd.Timestamp(weights.index[-1]).date()

          is_current_month = (
              latest_rebalance.year == now_ny.year
              and latest_rebalance.month == now_ny.month
          )

          print(f"Latest rebalance date: {latest_rebalance}")
          print(f"Current New York date: {now_ny}")
          print(f"Current-month rebalance found: {is_current_month}")

          set_output("current_month_rebalance", "true" if is_current_month else "false")
          set_output("latest_rebalance_date", latest_rebalance.isoformat())

          PY

      - name: Generate plain-English allocation explanation
        if: steps.check_rebalance.outputs.current_month_rebalance == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python explain_v516_allocation_fixed.py \
            --output-dir outputs_option2_v5_16_score_tilted_cvar \
            --window 2023 \
            --zip

      - name: Upload allocation artifacts
        if: steps.check_rebalance.outputs.current_month_rebalance == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: v516-allocation-${{ steps.check_rebalance.outputs.run_month }}-${{ github.run_number }}
          path: |
            outputs_option2_v5_16_score_tilted_cvar/walk_forward_summary.csv
            outputs_option2_v5_16_score_tilted_cvar/benchmark_comparison_by_window.csv
            outputs_option2_v5_16_score_tilted_cvar/rolling_12m_summary_by_window.csv
            outputs_option2_v5_16_score_tilted_cvar/walk_forward_windows/2023/final_target_weights_tradeable.csv
            outputs_option2_v5_16_score_tilted_cvar/walk_forward_windows/2023/final_allocation_attribution.csv
            outputs_option2_v5_16_score_tilted_cvar/walk_forward_windows/2023/allocation_attribution_by_rebalance.csv
            outputs_option2_v5_16_score_tilted_cvar/walk_forward_windows/2023/final_portfolio_selection_reasons.csv
            outputs_option2_v5_16_score_tilted_cvar/walk_forward_windows/2023/signal_cash_history.csv
            outputs_option2_v5_16_score_tilted_cvar/walk_forward_windows/2023/turnover_by_rebalance.csv
            outputs_option2_v5_16_score_tilted_cvar/walk_forward_windows/2023/benchmark_comparison.csv
            outputs_option2_v5_16_score_tilted_cvar/allocation_explanation_reports/
          if-no-files-found: warn
          retention-days: 90

      - name: Commit updated allocation outputs
        if: steps.check_rebalance.outputs.current_month_rebalance == 'true' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add outputs_option2_v5_16_score_tilted_cvar || true

          if git diff --cached --quiet; then
            echo "No allocation output changes to commit."
          else
            git commit -m "Update monthly V5.16 ETF allocation outputs - ${{ steps.check_rebalance.outputs.latest_rebalance_date }}"
            git pull --rebase
            git push
          fi

      - name: Skip notice
        if: steps.check_rebalance.outputs.current_month_rebalance != 'true' && github.event_name != 'workflow_dispatch'
        run: |
          echo "No current-month rebalance found yet. This can happen when the 1st is a weekend/holiday or yfinance has not updated. Nothing was committed."
