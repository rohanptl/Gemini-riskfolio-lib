name: Monthly V5.16 ETF Allocation

on:
  workflow_dispatch:
  schedule:
    # Run during the first 7 calendar days of each month after US market close.
    # GitHub cron schedules are UTC.
    # 23:30 UTC = 7:30 PM ET during daylight saving time, 6:30 PM ET otherwise.
    # Running days 1-7 makes the workflow robust when the 1st is a weekend/holiday.
    - cron: "30 23 1-7 * *"

permissions:
  contents: write

concurrency:
  group: monthly-v516-allocation
  cancel-in-progress: false

jobs:
  run-v516-allocation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas numpy yfinance riskfolio-lib openpyxl matplotlib
          fi

      - name: Set dynamic END_DATE
        shell: bash
        run: |
          # yfinance end date is effectively exclusive, so use tomorrow in UTC.
          # This helps include the most recent completed trading day.
          END_DATE=$(python - <<'PY'
from datetime import datetime, timedelta, timezone
print((datetime.now(timezone.utc).date() + timedelta(days=1)).isoformat())
PY
)
          echo "Using END_DATE=${END_DATE}"

          python - <<PY
from pathlib import Path
import re

script = Path("v5_16_Final.py.py")
if not script.exists():
    raise FileNotFoundError(f"Missing strategy script: {script}")

text = script.read_text()
text_new = re.sub(
    r'^END_DATE\s*=\s*["\\'][0-9]{4}-[0-9]{2}-[0-9]{2}["\\'].*$',
    f'END_DATE = "{END_DATE}"  # set dynamically by GitHub Actions',
    text,
    count=1,
    flags=re.MULTILINE,
)

if text_new == text:
    raise RuntimeError("Could not update END_DATE in strategy script.")

script.write_text(text_new)
print(f"Updated {script} END_DATE to {END_DATE}")
PY

      - name: Run V5.16 production strategy with attribution
        run: |
          python v5_16_Final.py.py

      - name: Generate plain-English allocation explanation
        run: |
          python explain_v516_allocation_fixed.py \
            --output-dir outputs_option2_v5_16_score_tilted_cvar \
            --window 2023 \
            --zip

      - name: Upload allocation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v516-allocation-${{ github.run_number }}
          path: |
            outputs_option2_v5_16_score_tilted_cvar/walk_forward_summary.csv
            outputs_option2_v5_16_score_tilted_cvar/benchmark_comparison_by_window.csv
            outputs_option2_v5_16_score_tilted_cvar/rolling_12m_summary_by_window.csv
            outputs_option2_v5_16_score_tilted_cvar/walk_forward_windows/2023/final_target_weights_tradeable.csv
            outputs_option2_v5_16_score_tilted_cvar/walk_forward_windows/2023/final_allocation_attribution.csv
            outputs_option2_v5_16_score_tilted_cvar/walk_forward_windows/2023/allocation_attribution_by_rebalance.csv
            outputs_option2_v5_16_score_tilted_cvar/walk_forward_windows/2023/final_portfolio_selection_reasons.csv
            outputs_option2_v5_16_score_tilted_cvar/walk_forward_windows/2023/signal_cash_history.csv
            outputs_option2_v5_16_score_tilted_cvar/walk_forward_windows/2023/turnover_by_rebalance.csv
            outputs_option2_v5_16_score_tilted_cvar/walk_forward_windows/2023/benchmark_comparison.csv
            outputs_option2_v5_16_score_tilted_cvar/allocation_explanation_reports/
          if-no-files-found: warn
          retention-days: 90

      - name: Commit updated allocation outputs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add outputs_option2_v5_16_score_tilted_cvar || true

          if git diff --cached --quiet; then
            echo "No allocation output changes to commit."
          else
            git commit -m "Update monthly V5.16 ETF allocation outputs"
            git push
          fi
